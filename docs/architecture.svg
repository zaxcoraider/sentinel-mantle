<!--
  SENTINEL — System Architecture Diagram
  
  For use in README.md. Dark mode default. Works on GitHub light + dark themes.
  ViewBox: 880x520. Renders crisp at any size.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="100%" style="max-width:880px;height:auto">
  <title>Sentinel architecture diagram</title>
  <desc>Three-tier system showing user, on-chain contracts, off-chain monitor, and frontend.</desc>

  <defs>
    <style>
      .label { font-family: 'Inter', system-ui, sans-serif; fill: #fafafa; }
      .label-dark { fill: #0a0a0a; }
      .mono { font-family: 'JetBrains Mono', monospace; }
      .h-title { font-size: 14px; font-weight: 700; letter-spacing: 1px; }
      .h-tier { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; fill: #737373; }
      .h-component { font-size: 13px; font-weight: 500; }
      .h-detail { font-size: 11px; fill: #a3a3a3; }

      @media (prefers-color-scheme: light) {
        .label { fill: #0a0a0a; }
        .label-dark { fill: #0a0a0a; }
        .h-detail { fill: #737373; }
        .bg-fill { fill: #fafafa; }
        .surface-fill { fill: #ffffff; }
      }
      .bg-fill { fill: #0a0a0a; }
      .surface-fill { fill: #1a1a1a; }
    </style>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" class="bg-fill"/>

  <!-- ============ TIER LABELS (left side) ============ -->
  <text x="40" y="80" class="label h-tier">USER</text>
  <text x="40" y="200" class="label h-tier">ON-CHAIN · MANTLE</text>
  <text x="40" y="360" class="label h-tier">OFF-CHAIN · MONITOR</text>
  <text x="40" y="470" class="label h-tier">FRONTEND</text>

  <!-- Horizontal dividers -->
  <line x1="40" y1="120" x2="840" y2="120" stroke="#262626" stroke-width="0.5"/>
  <line x1="40" y1="290" x2="840" y2="290" stroke="#262626" stroke-width="0.5"/>
  <line x1="40" y1="410" x2="840" y2="410" stroke="#262626" stroke-width="0.5"/>

  <!-- ============ USER TIER ============ -->
  <g transform="translate(360, 50)">
    <rect width="160" height="50" rx="6" class="surface-fill" stroke="#2563eb" stroke-width="0.5"/>
    <text x="80" y="22" text-anchor="middle" class="label h-component">Agent Owner</text>
    <text x="80" y="38" text-anchor="middle" class="label h-detail mono">Human + ERC-8004 NFT</text>
  </g>

  <!-- User → Frontend arrow -->
  <line x1="440" y1="100" x2="440" y2="445" stroke="#2563eb" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.4"/>

  <!-- ============ ON-CHAIN TIER ============ -->
  <!-- AgentRegistry -->
  <g transform="translate(100, 150)">
    <rect width="160" height="110" rx="6" class="surface-fill" stroke="#2563eb" stroke-width="0.5"/>
    <text x="80" y="24" text-anchor="middle" class="label h-component">AgentRegistry</text>
    <text x="80" y="42" text-anchor="middle" class="label h-detail mono">ERC-8004 wrapper</text>
    <line x1="14" y1="56" x2="146" y2="56" stroke="#262626" stroke-width="0.5"/>
    <text x="80" y="74" text-anchor="middle" class="label h-detail">register agent</text>
    <text x="80" y="90" text-anchor="middle" class="label h-detail">link rules + guard</text>
  </g>

  <!-- SafetyRules -->
  <g transform="translate(290, 150)">
    <rect width="160" height="110" rx="6" class="surface-fill" stroke="#2563eb" stroke-width="0.5"/>
    <text x="80" y="24" text-anchor="middle" class="label h-component">SafetyRules</text>
    <text x="80" y="42" text-anchor="middle" class="label h-detail mono">per-agent config</text>
    <line x1="14" y1="56" x2="146" y2="56" stroke="#262626" stroke-width="0.5"/>
    <text x="80" y="74" text-anchor="middle" class="label h-detail">drawdown · tx rate</text>
    <text x="80" y="90" text-anchor="middle" class="label h-detail">allowlist · time window</text>
  </g>

  <!-- SentinelGuard (centerpiece) -->
  <g transform="translate(480, 150)">
    <rect width="180" height="110" rx="6" class="surface-fill" stroke="#2563eb" stroke-width="1.5"/>
    <text x="90" y="24" text-anchor="middle" class="label h-component">SentinelGuard</text>
    <text x="90" y="42" text-anchor="middle" class="label h-detail mono">vault + breaker</text>
    <line x1="14" y1="56" x2="166" y2="56" stroke="#262626" stroke-width="0.5"/>
    <text x="90" y="74" text-anchor="middle" class="label h-detail">deposits · executes</text>
    <text x="90" y="90" text-anchor="middle" class="label h-detail">pauses · rescues</text>
  </g>

  <!-- ReputationOracle -->
  <g transform="translate(690, 150)">
    <rect width="150" height="110" rx="6" class="surface-fill" stroke="#2563eb" stroke-width="0.5"/>
    <text x="75" y="24" text-anchor="middle" class="label h-component">Reputation</text>
    <text x="75" y="42" text-anchor="middle" class="label h-detail mono">public oracle</text>
    <line x1="14" y1="56" x2="136" y2="56" stroke="#262626" stroke-width="0.5"/>
    <text x="75" y="74" text-anchor="middle" class="label h-detail">on-chain scores</text>
    <text x="75" y="90" text-anchor="middle" class="label h-detail">history per agent</text>
  </g>

  <!-- On-chain internal arrows -->
  <line x1="260" y1="205" x2="290" y2="205" stroke="#2563eb" stroke-width="0.5" marker-end="url(#arrow-blue)"/>
  <line x1="450" y1="205" x2="480" y2="205" stroke="#2563eb" stroke-width="0.5" marker-end="url(#arrow-blue)"/>
  <line x1="660" y1="205" x2="690" y2="205" stroke="#2563eb" stroke-width="0.5" marker-end="url(#arrow-blue)"/>

  <!-- ============ MONITOR TIER ============ -->
  <!-- Event Listener -->
  <g transform="translate(140, 310)">
    <rect width="150" height="80" rx="6" class="surface-fill" stroke="#737373" stroke-width="0.5"/>
    <text x="75" y="22" text-anchor="middle" class="label h-component">Event Listener</text>
    <text x="75" y="40" text-anchor="middle" class="label h-detail mono">viem WebSocket</text>
    <text x="75" y="58" text-anchor="middle" class="label h-detail">multi-RPC failover</text>
  </g>

  <!-- Anomaly Engine -->
  <g transform="translate(360, 310)">
    <rect width="160" height="80" rx="6" class="surface-fill" stroke="#737373" stroke-width="0.5"/>
    <text x="80" y="22" text-anchor="middle" class="label h-component">Anomaly Engine</text>
    <text x="80" y="40" text-anchor="middle" class="label h-detail mono">rule evaluation</text>
    <text x="80" y="58" text-anchor="middle" class="label h-detail">+ Pyth oracle check</text>
  </g>

  <!-- Trigger -->
  <g transform="translate(590, 310)">
    <rect width="150" height="80" rx="6" class="surface-fill" stroke="#dc2626" stroke-width="0.5"/>
    <text x="75" y="22" text-anchor="middle" class="label h-component">Trigger</text>
    <text x="75" y="40" text-anchor="middle" class="label h-detail mono">on-chain executor</text>
    <text x="75" y="58" text-anchor="middle" class="label h-detail">5min idempotent</text>
  </g>

  <!-- Monitor flow -->
  <line x1="290" y1="350" x2="360" y2="350" stroke="#737373" stroke-width="0.5" marker-end="url(#arrow-blue)"/>
  <line x1="520" y1="350" x2="590" y2="350" stroke="#dc2626" stroke-width="0.5" marker-end="url(#arrow-red)"/>

  <!-- On-chain ⇅ monitor data flow -->
  <path d="M 570 260 L 570 280 L 215 280 L 215 310" stroke="#2563eb" stroke-width="0.5" fill="none" marker-end="url(#arrow-blue)" stroke-dasharray="3 3"/>
  <text x="385" y="276" class="label h-detail" text-anchor="middle">events stream</text>

  <!-- Monitor → Guard (the trigger) -->
  <path d="M 665 310 L 665 280 L 570 280 L 570 260" stroke="#dc2626" stroke-width="1" fill="none" marker-end="url(#arrow-red)"/>
  <text x="700" y="296" class="label h-detail" fill="#dc2626">triggerCircuitBreaker()</text>

  <!-- ============ FRONTEND TIER ============ -->
  <g transform="translate(140, 430)">
    <rect width="600" height="60" rx="6" class="surface-fill" stroke="#737373" stroke-width="0.5"/>
    <text x="300" y="22" text-anchor="middle" class="label h-component">Next.js 14 · wagmi + RainbowKit</text>
    <text x="120" y="44" text-anchor="middle" class="label h-detail">/onboard</text>
    <text x="240" y="44" text-anchor="middle" class="label h-detail">/dashboard</text>
    <text x="360" y="44" text-anchor="middle" class="label h-detail">/watch</text>
    <text x="480" y="44" text-anchor="middle" class="label h-detail">/agent/[id]</text>
    <text x="560" y="44" text-anchor="middle" class="label h-detail">/leaderboard</text>
  </g>

  <!-- ============ LEGEND ============ -->
  <g transform="translate(760, 460)">
    <line x1="0" y1="6" x2="20" y2="6" stroke="#2563eb" stroke-width="1"/>
    <text x="26" y="9" class="label h-detail">read</text>
    <line x1="0" y1="22" x2="20" y2="22" stroke="#dc2626" stroke-width="1"/>
    <text x="26" y="25" class="label h-detail">trigger</text>
  </g>

</svg>
