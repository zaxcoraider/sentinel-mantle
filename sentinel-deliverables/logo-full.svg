<!-- SENTINEL — Full lockup (mark + wordmark) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" width="360" height="80">
  <title>Sentinel wordmark</title>
  
  <!-- Shield mark on the left -->
  <g transform="translate(8, 16)">
    <path
      d="M24 0 L46 8 L46 24 C46 34 37 44 24 48 C11 44 2 34 2 24 L2 8 Z"
      fill="none"
      stroke="#2563eb"
      stroke-width="2.5"
      stroke-linejoin="round"
    />
    <line x1="14" y1="24" x2="20" y2="24" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" />
    <line x1="28" y1="24" x2="34" y2="24" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" />
    <circle cx="24" cy="24" r="2" fill="#2563eb" />
  </g>
  
  <!-- Wordmark -->
  <text
    x="68"
    y="52"
    font-family="'JetBrains Mono', 'IBM Plex Mono', 'Courier New', monospace"
    font-size="32"
    font-weight="700"
    letter-spacing="2"
    fill="currentColor"
  >SENTINEL</text>
</svg>
