<!--
  SENTINEL — Wordmark Logo
  
  Design rationale:
  - Monospace font conveys "infrastructure" not "consumer app"
  - Heavy lockup with shield glyph signals protection
  - Single accent color (electric blue #2563eb) — used sparingly
  - Works in light, dark, and monochrome contexts
  - Designed at 320x80 viewbox, scales to any size
  
  Usage:
  - logo-full.svg: wordmark + shield (primary lockup)
  - logo-mark.svg: shield only (favicon, app icon, small contexts)
  - logo-wordmark.svg: text only (banners, document headers)
  - logo-mono.svg: monochrome version for single-color contexts
-->

<!-- ============================================ -->
<!-- LOGO MARK ONLY (the shield) -->
<!-- Use as favicon, app icon, social profile pic -->
<!-- ============================================ -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Sentinel mark</title>
  <!-- Shield outline -->
  <path
    d="M32 4 L56 14 L56 32 C56 44 46 56 32 60 C18 56 8 44 8 32 L8 14 Z"
    fill="none"
    stroke="#2563eb"
    stroke-width="3"
    stroke-linejoin="round"
  />
  <!-- Inner circuit break / "broken connection" -->
  <line x1="20" y1="32" x2="28" y2="32" stroke="#2563eb" stroke-width="3" stroke-linecap="round" />
  <line x1="36" y1="32" x2="44" y2="32" stroke="#2563eb" stroke-width="3" stroke-linecap="round" />
  <!-- Center dot -->
  <circle cx="32" cy="32" r="2.5" fill="#2563eb" />
</svg>
